<style>
  :root{
    --ink:#14131F;
    --ink-soft:#6B6A78;
    --panel-dark:#1B1A28;
    --panel-dark-2:#221F35;
    --coral:#FF4D6D;
    --coral-deep:#E23856;
    --yellow:#FFC857;
    --paper:#FFFFFF;
    --paper-soft:#F5F3F1;
    --line:#E7E4E1;
    --line-dark:#33314A;
    --font-display:'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body:'Inter', 'Segoe UI', sans-serif;
    --font-mono:'Space Mono', 'Courier New', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--paper-soft); color:var(--ink); font-family:var(--font-body); }

  .app{
    display:grid;
    grid-template-columns: 380px 1fr;
    gap:24px;
    padding:24px;
    max-width:1440px;
    margin:0 auto;
  }
  @media (max-width: 900px){ .app{ grid-template-columns: 1fr; } }

  .builder{
    background:var(--panel-dark);
    border-radius:16px;
    padding:24px;
    align-self:start;
    position:sticky;
    top:24px;
    color:#EDEBFA;
  }
  .builder .brandmark{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .brandmark .sq{
    width:34px; height:34px; border-radius:9px;
    background:linear-gradient(135deg, var(--coral), var(--yellow));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:16px;
  }
  .logo-img{ width:34px; height:34px; object-fit:contain; }
  .brandmark .lbl{ font-family:var(--font-display); font-weight:600; font-size:15px; letter-spacing:.01em; }
  .brandmark .lbl small{ display:block; font-family:var(--font-body); font-weight:400; font-size:10.5px; color:#A6A3C0; letter-spacing:.08em; text-transform:uppercase; margin-top:1px;}

  .builder h1{ font-family:var(--font-display); font-size:19px; font-weight:600; margin:0 0 3px 0; color:#fff; }
  .builder .sub{ font-size:12px; color:#A6A3C0; margin:0 0 20px 0; line-height:1.5; }

  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:#8E8BAE; margin-bottom:5px; font-weight:600; }
  .field input, .field textarea{
    width:100%; border:1px solid var(--line-dark); border-radius:8px; padding:9px 11px;
    font-family:var(--font-body); font-size:13.5px; background:var(--panel-dark-2); color:#F2F0FB;
  }
  .field input::placeholder, .field textarea::placeholder{ color:#66638A; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--coral); }
  .field textarea{ resize:vertical; min-height:44px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  hr.sep{ border:none; border-top:1px solid var(--line-dark); margin:20px 0; }

  .presets{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .preset-pill{ display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:6px 8px 6px 11px; border:1px solid var(--line-dark); background:var(--panel-dark-2); color:#D8D6EE; border-radius:999px; }
  .preset-pill button.add{ background:none; border:none; color:#D8D6EE; cursor:pointer; font-size:11px; padding:0; }
  .preset-pill:hover{ border-color:var(--coral); }
  .preset-pill:hover button.add{ color:#fff; }
  .preset-pill button.rm{ background:none; border:none; color:#66638A; cursor:pointer; font-size:13px; line-height:1; padding:0 2px; }
  .preset-pill button.rm:hover{ color:var(--coral); }
  .preset-empty{ font-size:11.5px; color:#66638A; font-style:italic; padding:4px 0 12px 0; }
  .chk-row{ display:flex; align-items:center; gap:7px; font-size:12px; color:#B9B7D6; margin:2px 0 12px 0; cursor:pointer; }
  .chk-row input{ accent-color:var(--coral); width:14px; height:14px; }

  .item-form{ background:var(--panel-dark-2); border:1px solid var(--line-dark); border-radius:12px; padding:14px; margin-bottom:16px; }

  button.primary{ width:100%; background:var(--coral); color:#fff; border:none; padding:11px 14px; border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:var(--font-body); }
  button.primary:hover{ background:var(--coral-deep); }

  .totals-config{ margin-top:16px; }
  .totals-config .row2 .field{ margin-bottom:0; }

  .print-btn{ width:100%; margin-top:16px; background:transparent; border:1.5px solid #4B4870; color:#EDEBFA; padding:10px 14px; border-radius:8px; font-weight:600; font-size:13px; cursor:pointer; font-family:var(--font-body); }
  .print-btn:hover{ border-color:var(--yellow); color:var(--yellow); }

  .doc-wrap{ min-width:0; }
  .doc{ background:var(--paper); border-radius:16px; overflow:hidden; box-shadow:0 1px 3px rgba(20,19,31,0.08), 0 12px 32px rgba(20,19,31,0.06); }

  .doc-head{ background:var(--ink); color:#fff; padding:40px 52px 32px 52px; position:relative; overflow:hidden; }
  .doc-head::after{ content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, rgba(255,77,109,0.35), transparent 70%); }
  .doc-head-row{ display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1; }
  .doc-head .brandmark2{ display:flex; align-items:center; gap:12px; }
  .doc-head .sq2{ width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg, var(--coral), var(--yellow)); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--ink); font-size:18px; }
  .logo-img2{ width:42px; height:42px; object-fit:contain; }
  .doc-head .brand-name{ font-family:var(--font-display); font-size:20px; font-weight:600; margin:0; }
  .doc-head .brand-name small{ display:block; font-size:10.5px; color:#B9B7D6; font-weight:400; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
  .doc-head .meta{ text-align:right; font-size:11.5px; color:#B9B7D6; font-family:var(--font-mono); line-height:1.7; }
  .doc-head .proj-title{ font-family:var(--font-display); font-size:30px; font-weight:600; margin:26px 0 0 0; position:relative; z-index:1; max-width:80%; line-height:1.15; }
  .doc-head .proj-sub{ font-size:13px; color:#B9B7D6; margin-top:8px; position:relative; z-index:1; }

  .doc-body{ padding:40px 52px 48px 52px; }

  .doc-section-title{ font-family:var(--font-display); font-size:12px; text-transform:uppercase; letter-spacing:.09em; color:var(--coral-deep); margin:28px 0 12px 0; font-weight:700; }
  .doc-section-title:first-child{ margin-top:0; }

  .client-block{ font-size:14px; line-height:1.6; }
  .client-block .name{ font-weight:700; font-size:17px; font-family:var(--font-display); color:var(--ink); }

  .scope-text{ font-size:14px; line-height:1.75; color:#3A3846; white-space:pre-wrap; }

  table.ledger{ width:100%; border-collapse:collapse; margin-top:6px; font-size:13.5px; }
  table.ledger th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); border-bottom:2px solid var(--ink); padding:8px 10px; font-weight:700; }
  table.ledger th.num, table.ledger td.num{ text-align:right; font-family:var(--font-mono); }
  table.ledger td{ padding:13px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.ledger tr:last-child td{ border-bottom:none; }
  table.ledger td.desc strong{ font-family:var(--font-display); font-weight:600; font-size:14.5px; }
  table.ledger td.desc small{ display:block; color:var(--ink-soft); margin-top:3px; font-size:12px; line-height:1.5; }

  .totals-card{ margin-top:14px; background:var(--paper-soft); border-radius:12px; padding:18px 22px; }
  .tape-row{ display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12.5px; padding:5px 0; color:var(--ink-soft); }
  .tape-row.total{ color:var(--ink); font-weight:700; font-family:var(--font-display); font-size:24px; border-top:2px solid var(--ink); margin-top:8px; padding-top:14px; align-items:baseline; }
  .tape-row.total .val{ color:var(--coral-deep); }

  .stamp{ display:inline-block; margin-top:14px; background:var(--yellow); color:var(--ink); padding:5px 12px; border-radius:999px; font-family:var(--font-mono); font-weight:700; font-size:10.5px; letter-spacing:.05em; }

  .empty-hint{ color:var(--ink-soft); font-size:13px; font-style:italic; padding:18px 8px; text-align:center; }

  .item-list-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px solid var(--line-dark); font-size:12px; }
  .item-list-row .il-name{ font-weight:600; color:#EDEBFA; }
  .item-list-row .il-price{ font-family:var(--font-mono); color:#8E8BAE; white-space:nowrap; }
  .il-actions button{ border:none; background:none; cursor:pointer; font-size:12px; padding:0 4px; }
  .il-actions button.dup{ color:var(--yellow); }
  .il-actions button.del{ color:var(--coral); }

  .validity-note{ margin-top:34px; font-size:11px; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:14px; line-height:1.6; }

    body{ background:#fff; }
    .topbar{ display:none; }

  /* ---------- Topbar / tabs ---------- */
  .topbar{ background:var(--ink); padding:0 24px; }
  .topbar-inner{
    max-width:1440px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:14px 0; gap:20px; flex-wrap:wrap;
  }
  .topbar-brand{ display:flex; align-items:center; gap:9px; color:#fff; font-family:var(--font-display); font-weight:600; font-size:14.5px; }
  .topbar-sq{ width:20px; height:20px; border-radius:6px; background:linear-gradient(135deg, var(--coral), var(--yellow)); display:inline-block; }
  .tabs{ display:flex; gap:6px; }
  .tab-btn{
    background:transparent; border:1px solid var(--line-dark); color:#B9B7D6; padding:8px 14px;
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-body);
    display:flex; align-items:center; gap:7px;
  }
  .tab-btn:hover{ border-color:var(--coral); color:#fff; }
  .tab-btn.active{ background:var(--coral); border-color:var(--coral); color:#fff; }
  .tab-count{
    background:rgba(255,255,255,0.18); border-radius:999px; font-size:11px; padding:1px 7px; font-family:var(--font-mono);
  }
  .tab-btn.active .tab-count{ background:rgba(255,255,255,0.3); }

  .save-btn{
    width:100%; margin-top:18px; background:var(--panel-dark-2); border:1.5px solid var(--yellow);
    color:var(--yellow); padding:10px 14px; border-radius:8px; font-weight:600; font-size:13px;
    cursor:pointer; font-family:var(--font-body);
  }
  .save-btn:hover{ background:var(--yellow); color:var(--ink); }
  .save-btn.saved{ background:var(--yellow); color:var(--ink); border-color:var(--yellow); }
  .new-btn{
    background:none; border:none; color:#8E8BAE; font-size:11.5px; text-decoration:underline;
    cursor:pointer; padding:0 0 18px 0; font-family:var(--font-body); display:block;
  }
  .new-btn:hover{ color:var(--coral); }

  /* ---------- Library view ---------- */
  .library-view{ padding:24px; max-width:1440px; margin:0 auto; }
  .library-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; }
  .library-head h2{ font-family:var(--font-display); font-size:24px; margin:0 0 4px 0; color:var(--ink); }
  .library-head p{ font-size:13px; color:var(--ink-soft); margin:0; }

  .lib-empty{
    background:var(--paper); border-radius:16px; padding:60px 30px; text-align:center;
    color:var(--ink-soft); font-size:14px; box-shadow:0 1px 3px rgba(20,19,31,0.06);
  }

  .lib-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .lib-card{
    background:var(--paper); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(20,19,31,0.06), 0 8px 20px rgba(20,19,31,0.04);
    display:flex; flex-direction:column; gap:10px;

  .lib-card .lc-title{ font-family:var(--font-display); font-weight:600; font-size:16px; color:var(--ink); line-height:1.3; }
  .lib-card .lc-client{ font-size:12.5px; color:var(--ink-soft); }
  .lib-card .lc-meta{ font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); }
  .lib-card .lc-total{ font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--coral-deep); margin-top:2px; }
  .lib-card .lc-actions{ display:flex; gap:8px; margin-top:6px; }
  .lib-card .lc-actions button{
    flex:1; border-radius:7px; padding:7px 8px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--font-body); border:1px solid var(--line);
    background:var(--paper-soft); color:var(--ink);
  }
  .lib-card .lc-actions button.open{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .lib-card .lc-actions button.del{ color:var(--coral-deep); }
  .lib-card .lc-actions button:hover{ opacity:0.85; }

<script>
let items = [];
let idCounter = 1;
let presetIdCounter = 1;
let currentProposalId = null;

const PROPOSALS_KEY = 'homex_proposals_v1';
let proposals = [];

function loadProposals(){
  try{
    const raw = localStorage.getItem(PROPOSALS_KEY);
    proposals = raw ? JSON.parse(raw) : [];
  }catch(e){ proposals = []; }
}

function saveProposals(){
  try{ localStorage.setItem(PROPOSALS_KEY, JSON.stringify(proposals)); }
  catch(e){ /* segue só em memória se não conseguir salvar */ }
}

function collectState(){
  return {
    clientName: document.getElementById('clientName').value,
    propDate: document.getElementById('propDate').value,
    validDays: document.getElementById('validDays').value,
    projTitle: document.getElementById('projTitle').value,
    scopeIntro: document.getElementById('scopeIntro').value,
    discountPct: document.getElementById('discountPct').value,
    taxPct: document.getElementById('taxPct').value,
    items: JSON.parse(JSON.stringify(items)),
  };
}

function applyState(state){
  document.getElementById('clientName').value = state.clientName || '';
  document.getElementById('propDate').value = state.propDate || new Date().toISOString().slice(0,10);
  document.getElementById('validDays').value = state.validDays || 15;
  document.getElementById('projTitle').value = state.projTitle || '';
  document.getElementById('scopeIntro').value = state.scopeIntro || '';
  document.getElementById('discountPct').value = state.discountPct || 0;
  document.getElementById('taxPct').value = state.taxPct || 0;
  items = JSON.parse(JSON.stringify(state.items || []));
  const maxId = items.reduce((m,i)=>Math.max(m, i.id||0), 0);
  idCounter = maxId + 1;
  render();
}

function calcTotalFromState(state){
  const subtotal = (state.items||[]).reduce((s,i)=> s + (i.qty * i.price), 0);
  const discountPct = parseFloat(state.discountPct) || 0;
  const taxPct = parseFloat(state.taxPct) || 0;
  const afterDiscount = subtotal - subtotal*(discountPct/100);
  return afterDiscount + afterDiscount*(taxPct/100);
}

function newProposal(){
  currentProposalId = null;
  applyState({items:[], propDate: new Date().toISOString().slice(0,10), validDays:15});
  resetSaveBtn();
  switchView('builder');
}

function saveCurrentProposal(){
  const state = collectState();
  if(currentProposalId){
    const idx = proposals.findIndex(p=>p.id===currentProposalId);
    if(idx>-1){ proposals[idx] = {...proposals[idx], data: state, updatedAt: Date.now()}; }
  } else {
    currentProposalId = 'p_' + Date.now();
    proposals.unshift({ id: currentProposalId, data: state, createdAt: Date.now(), updatedAt: Date.now() });
  }
  saveProposals();
  renderLibrary();
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Salvo ✓';
  btn.classList.add('saved');
  setTimeout(resetSaveBtn, 1800);
}

function resetSaveBtn(){
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Salvar na biblioteca';
  btn.classList.remove('saved');
}

function openProposal(id){
  const p = proposals.find(x=>x.id===id);
  if(!p) return;
  currentProposalId = id;
  applyState(p.data);
  resetSaveBtn();
  switchView('builder');
}

function duplicateProposal(id){
  const p = proposals.find(x=>x.id===id);
  if(!p) return;
  const copyState = JSON.parse(JSON.stringify(p.data));
  copyState.clientName = copyState.clientName ? copyState.clientName + ' (cópia)' : copyState.clientName;
  const newId = 'p_' + Date.now();
  proposals.unshift({ id:newId, data:copyState, createdAt:Date.now(), updatedAt:Date.now() });
  saveProposals();
  renderLibrary();
}

function deleteProposal(id){
  if(!confirm('Excluir esta proposta da biblioteca? Essa ação não pode ser desfeita.')) return;
  proposals = proposals.filter(x=>x.id!==id);
  saveProposals();
  if(currentProposalId===id) currentProposalId = null;
  renderLibrary();
}

function renderLibrary(){
  document.getElementById('libCount').textContent = proposals.length;
  const wrap = document.getElementById('libraryList');
  if(proposals.length===0){
    wrap.innerHTML = `<div class="lib-empty">Nenhuma proposta salva ainda.<br>Monte uma proposta e clique em "Salvar na biblioteca".</div>`;
    return;
  }
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'lib-grid';
  proposals.forEach(p=>{
    const d = p.data;
    const dateStr = d.propDate ? new Date(d.propDate+'T00:00:00').toLocaleDateString('pt-BR') : '—';
    const total = calcTotalFromState(d);
    const card = document.createElement('div');
    card.className = 'lib-card';
    card.innerHTML = `
      <div class="lc-title">${escapeHtml(d.projTitle || 'Proposta sem título')}</div>
      <div class="lc-client">${escapeHtml(d.clientName || 'Cliente não definido')}</div>
      <div class="lc-meta">${dateStr} · ${(d.items||[]).length} ${(d.items||[]).length===1?'item':'itens'}</div>
      <div class="lc-total">${fmtBRL(total)}</div>
      <div class="lc-actions">
        <button class="open">Abrir</button>
        <button class="dup">Duplicar</button>
        <button class="del">Excluir</button>
      </div>`;
    card.querySelector('.open').onclick = ()=>openProposal(p.id);
    card.querySelector('.dup').onclick = ()=>duplicateProposal(p.id);
    card.querySelector('.del').onclick = ()=>deleteProposal(p.id);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
}

function switchView(view){
  const builderView = document.getElementById('builderView');
  const libraryView = document.getElementById('libraryView');
  const tabBuilder = document.getElementById('tabBuilderBtn');
  const tabLibrary = document.getElementById('tabLibraryBtn');
  if(view==='library'){
    builderView.style.display = 'none';
    libraryView.style.display = 'block';
    tabBuilder.classList.remove('active');
    tabLibrary.classList.add('active');
    renderLibrary();
  } else {
    builderView.style.display = 'grid';
    libraryView.style.display = 'none';
    tabLibrary.classList.remove('active');
    tabBuilder.classList.add('active');
  }
}

const DEFAULT_PRESETS = [
  {name:"Gestão de redes sociais", desc:"Planejamento, criação e publicação de conteúdo mensal.", qty:1, price:2200},
  {name:"Tráfego pago", desc:"Gestão de campanhas em Meta Ads / Google Ads.", qty:1, price:1800},
  {name:"Identidade visual", desc:"Criação de marca, logotipo e manual de aplicação.", qty:1, price:3500},
  {name:"Produção de conteúdo", desc:"Fotos e vídeos para redes sociais.", qty:1, price:1600},
];

const PRESETS_KEY = 'homex_quick_items_v1';
let presets = [];

function loadPresets(){
  try{
    const raw = localStorage.getItem(PRESETS_KEY);
    if(raw){
      presets = JSON.parse(raw).map(p=>({...p, id: presetIdCounter++}));
      return;
    }
  }catch(e){ /* localStorage indisponível neste preview — usa os padrões em memória */ }
  presets = DEFAULT_PRESETS.map(p=>({...p, id: presetIdCounter++}));
}

function savePresets(){
  try{
    localStorage.setItem(PRESETS_KEY, JSON.stringify(presets.map(({id, ...rest})=>rest)));
  }catch(e){ /* segue só em memória se não conseguir salvar */ }
}

function addPreset(p){
  presets.push({...p, id: presetIdCounter++});
  savePresets();
  renderPresets();
}

function removePreset(id){
  presets = presets.filter(p=>p.id!==id);
  savePresets();
  renderPresets();
}

function renderPresets(){
  const row = document.getElementById('presetRow');
  row.innerHTML = '';
  if(presets.length===0){
    const empty = document.createElement('div');
    empty.className='preset-empty';
    empty.textContent = 'Nenhum item rápido ainda. Marque "salvar também como item rápido" ao adicionar um item.';
    row.appendChild(empty);
    return;
  }
  presets.forEach(p=>{
    const pill = document.createElement('div');
    pill.className='preset-pill';
    pill.innerHTML = `<button class="add" title="Adicionar à proposta">+ ${escapeHtml(p.name)}</button><button class="rm" title="Remover atalho">✕</button>`;
    pill.querySelector('.add').onclick = ()=>{ items.push({id:idCounter++, name:p.name, desc:p.desc, qty:p.qty, price:p.price}); render(); };
    pill.querySelector('.rm').onclick = ()=>{ removePreset(p.id); };
    row.appendChild(pill);
  });
}

function initPresets(){
  loadPresets();
  renderPresets();
}

function addItem(){
  const name = document.getElementById('itName').value.trim();
  const desc = document.getElementById('itDesc').value.trim();
  const qty = parseFloat(document.getElementById('itQty').value) || 0;
  const price = parseFloat(document.getElementById('itPrice').value) || 0;
  if(!name){ document.getElementById('itName').focus(); return; }
  items.push({id:idCounter++, name, desc, qty, price});
  if(document.getElementById('itSaveShortcut').checked){
    addPreset({name, desc, qty, price});
  }
  document.getElementById('itName').value='';
  document.getElementById('itDesc').value='';
  document.getElementById('itQty').value=1;
  document.getElementById('itPrice').value=0;
  document.getElementById('itSaveShortcut').checked=false;
  render();
}

function removeItem(id){ items = items.filter(i=>i.id!==id); render(); }
function dupItem(id){ const it = items.find(i=>i.id===id); if(it) items.push({...it, id:idCounter++}); render(); }

function fmtBRL(v){ return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

function render(){
  const panel = document.getElementById('itemListPanel');
  panel.innerHTML = '';
  if(items.length){
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '10px';
    items.forEach(it=>{
      const row = document.createElement('div');
      row.className='item-list-row';
      row.innerHTML = `
        <div><div class="il-name">${escapeHtml(it.name)}</div></div>
        <div class="il-price">${it.qty} × ${fmtBRL(it.price)}</div>
        <div class="il-actions">
          <button class="dup" onclick="dupItem(${it.id})" title="Duplicar">⧉</button>
          <button class="del" onclick="removeItem(${it.id})" title="Remover">✕</button>
        </div>`;
      wrap.appendChild(row);
    });
    panel.appendChild(wrap);
  }

  const subtotal = items.reduce((s,i)=> s + (i.qty * i.price), 0);
  const discountPct = parseFloat(document.getElementById('discountPct').value) || 0;
  const taxPct = parseFloat(document.getElementById('taxPct').value) || 0;
  const discountVal = subtotal * (discountPct/100);
  const afterDiscount = subtotal - discountVal;
  const taxVal = afterDiscount * (taxPct/100);
  const total = afterDiscount + taxVal;

  const client = document.getElementById('clientName').value || '—';
  const dateRaw = document.getElementById('propDate').value;
  const date = dateRaw ? new Date(dateRaw+'T00:00:00').toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');
  const validDays = document.getElementById('validDays').value || '15';
  const title = document.getElementById('projTitle').value || 'Proposta de Serviço';
  const intro = document.getElementById('scopeIntro').value;

  let rowsHtml = '';
  if(items.length===0){
    rowsHtml = `<tr><td colspan="4" class="empty-hint">Nenhum item adicionado ainda. Use o painel à esquerda para montar o escopo.</td></tr>`;
  } else {
    items.forEach(it=>{
      rowsHtml += `<tr>
        <td class="desc"><strong>${escapeHtml(it.name)}</strong>${it.desc ? `<small>${escapeHtml(it.desc)}</small>` : ''}</td>
        <td class="num">${it.qty}</td>
        <td class="num">${fmtBRL(it.price)}</td>
        <td class="num">${fmtBRL(it.qty*it.price)}</td>
      </tr>`;
    });
  }

  const doc = document.getElementById('docPreview');
  doc.innerHTML = `
    <div class="doc-head">

function exportPdf(){
  const btn = document.getElementById('exportBtn');

  if (typeof html2pdf === 'undefined') {
    // Biblioteca não carregou (bloqueio de rede/CSP) — usa o caminho nativo do navegador
    window.print();
    return;
  }

  const original = btn.textContent;
  btn.textContent = 'Gerando PDF...';
  btn.disabled = true;

  const source = document.getElementById('docPreview');
  const clientRaw = document.getElementById('clientName').value || 'proposta';
  const safeClient = clientRaw.trim().replace(/[^\p{L}\p{N}]+/gu, '_').replace(/^_+|_+$/g,'') || 'proposta';
  const filename = `Proposta_Homex_${safeClient}.pdf`;

  // Captura uma cópia com largura fixa (independente do tamanho da tela de quem gerou),
  // renderizada fora da área visível, pra garantir um resultado sempre consistente.
  const clone = source.cloneNode(true);
  clone.style.width = '794px';
  clone.style.maxWidth = '794px';
  clone.style.position = 'fixed';
  clone.style.top = '0';
  clone.style.left = '-10000px';
  clone.style.margin = '0';
  clone.style.boxShadow = 'none';
  document.body.appendChild(clone);

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      scrollX: 0,
      scrollY: 0
    },
    jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
  };

  const cleanup = ()=>{
    document.body.removeChild(clone);
    btn.textContent = original;
    btn.disabled = false;
  };

  html2pdf().set(opt).from(clone).save().then(cleanup).catch((err)=>{
    console.error(err);
    cleanup();
    // Se falhar no meio do processo, cai para o caminho nativo do navegador
    window.print();
  });
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

['clientName','propDate','validDays','projTitle','scopeIntro'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
});

document.getElementById('propDate').value = new Date().toISOString().slice(0,10);
